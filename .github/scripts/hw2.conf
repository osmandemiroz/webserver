# HW2 Review Config — Entity Framework Core
# Each line calls a check function defined in review-hw.sh

PRJ="${ROOT}/BookLibraryEF"

section "1. Project Setup"
check_file  "BookLibraryEF.csproj exists"                   "${PRJ}/BookLibraryEF.csproj"
check_grep  "Targets net8.0"                                "net8\\.0"                                    "${PRJ}/BookLibraryEF.csproj"
check_grep  "NuGet: EntityFrameworkCore"                    "Microsoft\\.EntityFrameworkCore\""             "${PRJ}/BookLibraryEF.csproj"
check_grep  "NuGet: EF Core SqlServer"                     "EntityFrameworkCore\\.SqlServer"               "${PRJ}/BookLibraryEF.csproj"
check_grep  "NuGet: EF Core Tools"                         "EntityFrameworkCore\\.Tools"                   "${PRJ}/BookLibraryEF.csproj"
check_grep  "Connection string in appsettings"             "ConnectionStrings"                             "${PRJ}/appsettings.json"

section "2. Models"
check_file  "Author model exists"                          "${PRJ}/Models/Author.cs"
check_grep  "Author: AuthorID property"                    "int AuthorID"                                  "${PRJ}/Models/Author.cs"
check_grep  "Author: AuthorName property"                  "string AuthorName"                             "${PRJ}/Models/Author.cs"
check_grep  "Author: AuthorInfo property"                  "string AuthorInfo"                             "${PRJ}/Models/Author.cs"
check_grep  "Author: Books navigation"                     "ICollection<Book>"                             "${PRJ}/Models/Author.cs"

check_file  "User model exists"                            "${PRJ}/Models/User.cs"
check_grep  "User: UserID property"                        "int UserID"                                    "${PRJ}/Models/User.cs"
check_grep  "User: Name property"                          "string Name"                                   "${PRJ}/Models/User.cs"
check_grep  "User: Email property"                         "string Email"                                  "${PRJ}/Models/User.cs"
check_grep  "User: Books navigation (M2M)"                 "ICollection<Book>"                             "${PRJ}/Models/User.cs"

check_file  "Book model exists"                            "${PRJ}/Models/Book.cs"
check_grep  "Book: BookID property"                        "int BookID"                                    "${PRJ}/Models/Book.cs"
check_grep  "Book: Title property"                         "string Title"                                  "${PRJ}/Models/Book.cs"
check_grep  "Book: ReleaseYear property"                   "int ReleaseYear"                               "${PRJ}/Models/Book.cs"
check_grep  "Book: Price property"                         "double Price"                                  "${PRJ}/Models/Book.cs"
check_grep  "Book: ImageUrl property"                      "string ImageUrl"                               "${PRJ}/Models/Book.cs"
check_grep  "Book: AuthorID foreign key"                   "int AuthorID"                                  "${PRJ}/Models/Book.cs"
check_grep  "Book: Author navigation"                      "Author Author"                                 "${PRJ}/Models/Book.cs"
check_grep  "Book: Users navigation (M2M)"                 "ICollection<User>"                             "${PRJ}/Models/Book.cs"

section "3. DbContext"
check_dir   "Data folder exists"                           "${PRJ}/Data"
check_file  "LibraryContext.cs exists"                     "${PRJ}/Data/LibraryContext.cs"
check_grep  "Inherits DbContext"                           "class LibraryContext.*:.*DbContext"             "${PRJ}/Data/LibraryContext.cs"
check_grep  "DbSet<Book>"                                  "DbSet<Book>"                                   "${PRJ}/Data/LibraryContext.cs"
check_grep  "DbSet<Author>"                                "DbSet<Author>"                                 "${PRJ}/Data/LibraryContext.cs"
check_grep  "DbSet<User>"                                  "DbSet<User>"                                   "${PRJ}/Data/LibraryContext.cs"
check_grep  "OnModelCreating override"                     "OnModelCreating"                                "${PRJ}/Data/LibraryContext.cs"

section "4. Database (Code-First)"
check_dir   "Migrations folder exists"                     "${PRJ}/Migrations"

section "5. Controller"
check_file  "LibraryController.cs exists"                  "${PRJ}/Controllers/LibraryController.cs"
check_grep  "DbContext injected via DI"                    "LibraryContext"                                 "${PRJ}/Controllers/LibraryController.cs"
check_grep  "Index action with EF query"                   "Include.*Author"                                "${PRJ}/Controllers/LibraryController.cs"
check_grep  "AddBook action exists"                        "AddBook"                                        "${PRJ}/Controllers/LibraryController.cs"
check_grep  "AddUser action exists"                        "AddUser"                                        "${PRJ}/Controllers/LibraryController.cs"
check_grep  "RentBook action exists"                       "RentBook"                                       "${PRJ}/Controllers/LibraryController.cs"

section "6. Views"
check_file  "Library/Index.cshtml exists"                  "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Index shows author info"                      "Author"                                         "${PRJ}/Views/Library/Index.cshtml"
check_file  "Library/AddBook.cshtml exists"                "${PRJ}/Views/Library/AddBook.cshtml"
check_file  "Library/AddUser.cshtml exists"                "${PRJ}/Views/Library/AddUser.cshtml"
check_file  "Library/RentBook.cshtml exists"               "${PRJ}/Views/Library/RentBook.cshtml"

section "7. Routing"
check_grep  "Default MVC route configured"                "controller=Home.*action=Index"                   "${PRJ}/Program.cs"
check_grep  "DbContext registered in Program.cs"           "AddDbContext"                                    "${PRJ}/Program.cs"

section "8. Deployment & Submission"
check_file  "Dockerfile exists"                            "${PRJ}/Dockerfile"
check_grep  "Dockerfile uses BookLibraryEF.dll"            "BookLibraryEF\\.dll"                            "${PRJ}/Dockerfile"
check_file  "ReadMe.txt exists"                            "${PRJ}/ReadMe.txt"
check_grep_dir "Namespaces use BookLibraryEF"              "namespace BookLibraryEF"                         "${PRJ}/Controllers" "*.cs"
