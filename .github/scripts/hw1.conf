# HW1 Review Config — ASP.NET Core MVC Basics
# Each line calls a check function defined in review-hw.sh

PRJ="${ROOT}/BookLibrary"

section "1. Project Setup"
check_file  "BookLibrary.csproj exists"            "${PRJ}/BookLibrary.csproj"
check_grep  "Targets net8.0"                       "net8\\.0"                    "${PRJ}/BookLibrary.csproj"
check_file  "Program.cs exists"                    "${PRJ}/Program.cs"

section "2. Model"
check_file  "Models/Book.cs exists"                "${PRJ}/Models/Book.cs"
check_grep  "BookID (int) property"                "int BookID"                  "${PRJ}/Models/Book.cs"
check_grep  "Title (string) property"              "string Title"                "${PRJ}/Models/Book.cs"
check_grep  "Director (string) property"           "string Director"             "${PRJ}/Models/Book.cs"
check_grep  "Stars (string[]) property"            "string\[\] Stars"            "${PRJ}/Models/Book.cs"
check_grep  "ReleaseYear (int) property"           "int ReleaseYear"             "${PRJ}/Models/Book.cs"
check_grep  "ImageUrl (string) property"           "string ImageUrl"             "${PRJ}/Models/Book.cs"
check_grep  "Price (double) property"              "double Price"                "${PRJ}/Models/Book.cs"

section "3. Controller"
check_file  "LibraryController.cs exists"          "${PRJ}/Controllers/LibraryController.cs"
check_grep  "Index action method"                  "IActionResult Index"         "${PRJ}/Controllers/LibraryController.cs"
check_grep  "Returns View with data"               "return View"                 "${PRJ}/Controllers/LibraryController.cs"
check_count "At least 5 books in list"             "new Book"                    "${PRJ}/Controllers/LibraryController.cs" 5

section "4. View"
check_dir   "Views/Library folder exists"          "${PRJ}/Views/Library"
check_file  "Views/Library/Index.cshtml exists"    "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Strongly typed @model"                "@model"                      "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Displays book image"                  "ImageUrl"                    "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Displays rating (Stars)"              "Stars|star|rating"           "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Displays price"                       "Price"                       "${PRJ}/Views/Library/Index.cshtml"
check_grep  "Uses @foreach iteration"              "@foreach"                    "${PRJ}/Views/Library/Index.cshtml"

section "5. Routing"
check_grep  "Default MVC route configured"         "controller=Home.*action=Index" "${PRJ}/Program.cs"

section "6. Deployment"
check_file  "Dockerfile exists"                    "${PRJ}/Dockerfile"
check_grep  "Dockerfile uses BookLibrary.dll"      "BookLibrary\\.dll"           "${PRJ}/Dockerfile"
