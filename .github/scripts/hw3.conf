check_grep  "Rent callback to parent"                       "onRent"                                          "${PRJ}/src/components/RentBook.js"

section "5. Component Architecture & Routing"
check_file  "App.js exists"                                 "${PRJ}/src/App.js"
check_grep  "Uses BrowserRouter"                            "BrowserRouter|Router"                             "${PRJ}/src/App.js"
check_grep  "Route for books (index)"                       "path=\"/\""                                      "${PRJ}/src/App.js"
check_grep  "Route for users"                               "path=\"/users\""                                 "${PRJ}/src/App.js"
check_grep  "Route for rent"                                "path=\"/rent\""                                  "${PRJ}/src/App.js"
check_file  "Navbar component exists"                       "${PRJ}/src/components/Navbar.js"
check_grep  "Bootstrap imported"                            "bootstrap"                                       "${PRJ}/src/index.js"

section "6. Deployment & Submission"
check_file  "Dockerfile exists"                             "${PRJ}/Dockerfile"
check_grep  "Dockerfile uses node build stage"              "node.*AS build"                                  "${PRJ}/Dockerfile"
check_grep  "Dockerfile uses nginx runtime"                 "nginx"                                           "${PRJ}/Dockerfile"
check_grep  "Dockerfile exposes port 8080"                  "EXPOSE 8080"                                     "${PRJ}/Dockerfile"
check_file  "ReadMe.txt exists"                             "${PRJ}/ReadMe.txt"
