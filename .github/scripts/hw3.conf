# HW3 Review Config — React Frontend Application
# Each line calls a check function defined in review-hw.sh

PRJ="${ROOT}/book-library-app-react"

section "1. Project Setup"
check_file  "package.json exists"                           "${PRJ}/package.json"
check_grep  "Project name is book-library-app-react"        "book-library-app-react"                          "${PRJ}/package.json"
check_grep  "Dependency: react"                             "\"react\""                                       "${PRJ}/package.json"
check_grep  "Dependency: react-dom"                         "\"react-dom\""                                   "${PRJ}/package.json"
check_grep  "Dependency: react-router-dom"                  "react-router-dom"                                "${PRJ}/package.json"
check_grep  "Dependency: axios"                             "\"axios\""                                       "${PRJ}/package.json"
check_grep  "Dependency: bootstrap"                         "\"bootstrap\""                                   "${PRJ}/package.json"

section "2. Data Models (JSON Files)"
check_file  "authors.json exists"                           "${PRJ}/public/data/authors.json"
check_grep  "Author: authorID field"                        "authorID"                                        "${PRJ}/public/data/authors.json"
check_grep  "Author: authorName field"                      "authorName"                                      "${PRJ}/public/data/authors.json"
check_grep  "Author: authorInfo field"                      "authorInfo"                                      "${PRJ}/public/data/authors.json"

check_file  "books.json exists"                             "${PRJ}/public/data/books.json"
check_grep  "Book: bookID field"                            "bookID"                                          "${PRJ}/public/data/books.json"
check_grep  "Book: title field"                             "\"title\""                                       "${PRJ}/public/data/books.json"
check_grep  "Book: releaseYear field"                       "releaseYear"                                     "${PRJ}/public/data/books.json"
check_grep  "Book: price field"                             "\"price\""                                       "${PRJ}/public/data/books.json"
check_grep  "Book: authorID field"                          "authorID"                                        "${PRJ}/public/data/books.json"

check_file  "users.json exists"                             "${PRJ}/public/data/users.json"
check_grep  "User: userID field"                            "userID"                                          "${PRJ}/public/data/users.json"
check_grep  "User: name field"                              "\"name\""                                        "${PRJ}/public/data/users.json"
check_grep  "User: email field"                             "\"email\""                                       "${PRJ}/public/data/users.json"
check_grep  "User: rentedBookIDs field"                     "rentedBookIDs"                                   "${PRJ}/public/data/users.json"

section "3. Data Source (API Consumption)"
check_file  "API service exists"                            "${PRJ}/src/services/api.js"
check_grep  "Fetches from remote GitHub URL"                "raw.githubusercontent.com/emindk/JSON_Files"     "${PRJ}/src/services/api.js"
check_grep  "Uses axios for HTTP requests"                  "import axios"                                    "${PRJ}/src/services/api.js"
check_grep  "Local fallback data path"                      "/data"                                           "${PRJ}/src/services/api.js"
check_grep  "getAuthors function exported"                  "export.*getAuthors"                               "${PRJ}/src/services/api.js"
check_grep  "getBooks function exported"                    "export.*getBooks"                                 "${PRJ}/src/services/api.js"
check_grep  "getUsers function exported"                    "export.*getUsers"                                 "${PRJ}/src/services/api.js"

section "4.1 Book List Page (Index)"
check_file  "BookList component exists"                     "${PRJ}/src/components/BookList.js"
check_grep  "Displays book title"                           "book.title"                                      "${PRJ}/src/components/BookList.js"
check_grep  "Resolves author name (not ID)"                 "getAuthorName"                                   "${PRJ}/src/components/BookList.js"
check_grep  "Displays book price"                           "book.price"                                      "${PRJ}/src/components/BookList.js"
check_grep  "Displays book image"                           "book.imageUrl"                                   "${PRJ}/src/components/BookList.js"

section "4.2 User List Page"
check_file  "UserList component exists"                     "${PRJ}/src/components/UserList.js"
check_grep  "Displays user name"                            "user.name"                                       "${PRJ}/src/components/UserList.js"
check_grep  "Displays user email"                           "user.email"                                      "${PRJ}/src/components/UserList.js"
check_grep  "Resolves book names (not IDs)"                 "getBookTitle"                                    "${PRJ}/src/components/UserList.js"
check_grep  "Uses rentedBookIDs"                            "rentedBookIDs"                                   "${PRJ}/src/components/UserList.js"

section "4.3 Rent Book Feature"
check_file  "RentBook component exists"                     "${PRJ}/src/components/RentBook.js"
check_grep  "User selection"                                "selectedUserID"                                   "${PRJ}/src/components/RentBook.js"
check_grep  "Book selection"                                "selectedBookID"                                   "${PRJ}/src/components/RentBook.js"
