name: Claude Review

on:
  push:
    branches: [main]
    paths:
      - 'bim308_hw*/**'
  workflow_dispatch:
    inputs:
      hw_number:
        description: 'Assignment number to review (leave empty for all)'
        required: false

permissions:
  issues: write

jobs:
  detect-assignments:
    runs-on: ubuntu-latest
    outputs:
      assignments: ${{ steps.detect.outputs.assignments }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect which assignments to review
        id: detect
        run: |
          if [[ -n "${{ github.event.inputs.hw_number }}" ]]; then
            echo 'assignments=["${{ github.event.inputs.hw_number }}"]' >> "$GITHUB_OUTPUT"
          else
            # Find all hw configs that exist
            HWS="[]"
            for conf in .github/scripts/hw*.conf; do
              NUM=$(echo "$conf" | grep -oE '[0-9]+')
              DIR="bim308_hw${NUM}"
              if [[ -d "$DIR" ]]; then
                HWS=$(echo "$HWS" | jq -c ". + [\"${NUM}\"]")
              fi
            done
            echo "assignments=${HWS}" >> "$GITHUB_OUTPUT"
          fi

  review:
    needs: detect-assignments
    if: needs.detect-assignments.outputs.assignments != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hw: ${{ fromJson(needs.detect-assignments.outputs.assignments) }}
    steps:
      - uses: actions/checkout@v4

      - name: Run review for HW${{ matrix.hw }}
        id: review
        run: |
          chmod +x .github/scripts/review-hw.sh
          REVIEW=$(.github/scripts/review-hw.sh "${{ matrix.hw }}")

          # Write to file for the next step (handles multiline)
          echo "$REVIEW" > /tmp/review-body.md

          # Also write to REVIEW.md in the assignment folder
          echo "$REVIEW" > "bim308_hw${{ matrix.hw }}/REVIEW.md"

      - name: Create or update GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const hw = '${{ matrix.hw }}';
            const title = `Claude Review — BIM308 HW${hw}`;
            const body = fs.readFileSync('/tmp/review-body.md', 'utf8');
            const labels = ['claude-review'];

            // Find existing issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: labels.join(','),
            });

            const existing = issues.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
              console.log(`Updated issue #${existing.number}`);
            } else {
              // Ensure label exists
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'claude-review',
                  color: '7C3AED',
                  description: 'Automated assignment review by Claude',
                });
              } catch (e) {
                // Label already exists
              }

              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: labels,
              });
              console.log(`Created issue #${created.data.number}`);
            }

      - name: Commit updated REVIEW.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "bim308_hw${{ matrix.hw }}/REVIEW.md"
          if git diff --cached --quiet; then
            echo "No changes to REVIEW.md"
          else
            git commit -m "Update Claude Review for HW${{ matrix.hw }} [skip ci]"
            git push
          fi
